<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="blueGrad2Icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect width="32" height="32" rx="8" fill="url(#blueGrad2Icon)" />
  
  <!-- 机器人头部（居中） -->
  <rect x="8" y="11" width="16" height="14" rx="3" fill="#FFFFFF" />
  
  <!-- 机器人天线（居中） -->
  <line x1="16" y1="11" x2="16" y2="7" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="16" cy="5.5" r="1.5" fill="#1E40AF" />
  
  <!-- 机器人眼睛（对称） -->
  <circle cx="12" cy="16" r="2" fill="#1E40AF" />
  <circle cx="20" cy="16" r="2" fill="#1E40AF" />
  
  <!-- 机器人嘴巴（居中） -->
  <rect x="12" y="21" width="8" height="2" rx="1" fill="#1E40AF" />
</svg>