<!DOCTYPE html>
<html>
  <head>
    <title>AI Help Me</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html { background: #F5F5F7; color-scheme: light; }
      @media (prefers-color-scheme: dark) {
        html { background: #000000; color-scheme: dark; }
      }
    </style>
    <script>
      (function() {
        var pref = null;
        try { pref = localStorage.getItem("ai-help-me:theme"); } catch(e) {}
        if (pref === "dark") {
          document.documentElement.style.background = "#000000";
          document.documentElement.style.colorScheme = "dark";
        } else if (pref === "light") {
          document.documentElement.style.background = "#F5F5F7";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="__plasmo"></div>
  </body>
</html>
